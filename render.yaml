# Render Blueprint — Approval Workflow
# Docs: https://render.com/docs/blueprint-spec
#
# After connecting GitHub, use "New > Blueprint" and select this repo.
# Set sync: false secrets in the Render dashboard before first deploy.

databases:
  - name: approval-workflow-db
    databaseName: approval_workflow
    user: approval_workflow
    plan: free

services:
  - type: web
    name: approval-workflow-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: approval-workflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: STORAGE_BACKEND
        value: google_drive
      - key: GOOGLE_DRIVE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false

  - type: web
    name: approval-workflow
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
